<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EZPOK168 BIO</title>
<meta name="theme-color" content="#12051f">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #05030d;
  --panel: rgba(12, 8, 24, .68);
  --text: #fffaf0;
  --muted: rgba(255, 250, 240, .82);
  --gold: #f6ca3d;
  --gold-soft: #fff4b8;
  --violet: #8c35ff;
  --magenta: #e24cff;
  --cyan: #32c7ff;
  --line: rgba(255, 228, 123, .48);
  --bio-background-image: url("brand/bio-background.webp");
  font-family: Arial, "Tahoma", sans-serif;
}

body {
  position: relative;
  min-height: 100vh;
  padding: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
  background: var(--bg) var(--bio-background-image) center / cover fixed no-repeat;
  isolation: isolate;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    linear-gradient(180deg, rgba(4, 3, 14, .12), rgba(5, 2, 12, .78)),
    radial-gradient(ellipse at 50% 38%, rgba(255, 255, 255, .08), transparent 45%),
    radial-gradient(ellipse at 78% 24%, rgba(226, 76, 255, .3), transparent 42%);
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    linear-gradient(90deg, rgba(50, 199, 255, .18), transparent 24%, transparent 74%, rgba(246, 202, 61, .15)),
    rgba(2, 1, 7, .24);
  backdrop-filter: blur(3px) saturate(1.18);
}

.card {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 430px;
  padding: 26px;
  text-align: center;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 24px;
  box-shadow:
    0 24px 78px rgba(0, 0, 0, .56),
    0 0 0 1px rgba(255, 255, 255, .1) inset,
    0 0 48px rgba(140, 53, 255, .34);
  backdrop-filter: blur(18px) saturate(1.3);
}

.card::before {
  content: "";
  position: absolute;
  inset: 1px;
  z-index: -1;
  border-radius: 23px;
  background: linear-gradient(160deg, rgba(255, 255, 255, .12), rgba(255, 255, 255, .02) 38%, rgba(140, 53, 255, .16));
}

.profile {
  width: 176px;
  height: 176px;
  margin: 0 auto 22px;
  overflow: hidden;
  border: 3px solid var(--gold);
  border-radius: 28px;
  background: #07040c;
  box-shadow:
    0 0 0 2px rgba(255, 255, 255, .22) inset,
    0 0 28px rgba(246, 202, 61, .36),
    0 0 46px rgba(226, 76, 255, .35);
}

.profile img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
}

h1 {
  margin-bottom: 8px;
  color: var(--gold-soft);
  font-size: 32px;
  line-height: 1.15;
  text-shadow: 0 2px 0 rgba(83, 48, 0, .9), 0 0 24px rgba(246, 202, 61, .45);
}

p {
  margin-bottom: 28px;
  color: var(--muted);
  font-size: 16px;
  line-height: 1.55;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  min-height: 54px;
  margin-bottom: 14px;
  padding: 14px 16px;
  border: 0;
  border: 1px solid rgba(255, 255, 255, .32);
  border-radius: 16px;
  color: #120716;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, .78), rgba(255, 255, 255, 0) 34%),
    linear-gradient(100deg, #ffffff 0%, var(--gold-soft) 20%, var(--gold) 48%, #b85fff 76%, var(--cyan) 100%);
  font-size: 18px;
  font-weight: 800;
  line-height: 1.25;
  text-decoration: none;
  cursor: pointer;
  box-shadow:
    0 12px 26px rgba(7, 3, 20, .38),
    0 0 0 1px rgba(86, 39, 0, .18) inset,
    0 0 22px rgba(226, 76, 255, .22);
  transition: transform .2s ease, box-shadow .2s ease, filter .2s ease;
}

.btn:hover,
.btn:focus-visible {
  transform: translateY(-2px);
  box-shadow:
    0 16px 32px rgba(7, 3, 20, .45),
    0 0 26px rgba(246, 202, 61, .28),
    0 0 30px rgba(226, 76, 255, .35);
  filter: brightness(1.06);
  outline: none;
}

footer {
  margin-top: 12px;
  color: rgba(255, 247, 232, .5);
  font-size: 13px;
}

.modal {
  position: fixed;
  inset: 0;
  z-index: 999;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: rgba(5, 2, 9, .84);
  backdrop-filter: blur(10px);
}

.modal.is-open {
  display: flex;
}

.modal-content {
  position: relative;
  width: 100%;
  max-width: 940px;
  max-height: 88vh;
  overflow: auto;
  padding: 22px;
  background:
    linear-gradient(180deg, rgba(22, 10, 42, .96), rgba(8, 5, 17, .98)),
    var(--bio-background-image) center / cover no-repeat;
  border: 1px solid var(--gold);
  border-radius: 22px;
  box-shadow: 0 20px 65px rgba(0, 0, 0, .6), 0 0 42px rgba(140, 53, 255, .28);
}

.close {
  position: absolute;
  top: 12px;
  right: 14px;
  width: 36px;
  height: 36px;
  border: 0;
  border-radius: 50%;
  color: #fff;
  background: rgba(255, 255, 255, .12);
  font-size: 26px;
  line-height: 1;
  cursor: pointer;
}

.close:hover,
.close:focus-visible {
  background: rgba(255, 255, 255, .2);
  outline: none;
}

.modal h2 {
  padding-right: 38px;
  color: var(--gold-soft);
  text-align: center;
  font-size: 24px;
  line-height: 1.25;
  text-shadow: 0 0 18px rgba(246, 202, 61, .38);
}

.gallery {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
  margin-top: 20px;
}

.promo-card {
  margin: 0;
  overflow: hidden;
  border: 1px solid rgba(248, 215, 107, .35);
  border-radius: 16px;
  background: #050208;
  box-shadow: 0 8px 22px rgba(0, 0, 0, .36), 0 0 20px rgba(140, 53, 255, .18);
}

.promo-card img {
  display: block;
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: contain;
  background: #050208;
}

.promo-card figcaption {
  padding: 10px 12px;
  color: var(--gold);
  font-size: 15px;
  font-weight: 800;
  line-height: 1.35;
  text-align: center;
}

@media (min-width: 640px) {
  .gallery {
    grid-template-columns: 1fr 1fr;
  }
}

@media (max-width: 380px) {
  body {
    padding: 18px;
  }

  .card {
    padding: 22px;
  }

  .profile {
    width: 148px;
    height: 148px;
    border-radius: 24px;
  }

  h1 {
    font-size: 28px;
  }

  .btn {
    font-size: 16px;
  }
}
</style>
</head>

<script>
const clickStatsKey = "ezpok168BioClickStats";
const trackedButtonDefaults = {
  "visit-site": "เข้าชมหน้าเว็บ",
  "register": "สมัครสมาชิก",
  "promotion": "โปรโมชั่น",
  "contact-admin": "ติดต่อแอดมิน"
};

const defaultBioConfig = {
  title: "EZPOK168",
  subtitle: "บ้านป๊อกเด้งออนไลน์ โปรโมชั่นครบ จบในที่เดียว",
  profileImage: "brand/brand-profile.webp",
  backgroundImage: "brand/bio-background.webp",
  footer: "© EZPOK168 BIO",
  buttons: [
    {
      id: "visit-site",
      label: "เข้าชมหน้าเว็บ",
      href: "https://www.ezpok168.net/?utm_source=bio&utm_medium=button&utm_campaign=ezpok168_service",
      trackId: "visit-site",
      action: "link",
      enabled: true,
      targetBlank: true
    },
    {
      id: "register",
      label: "สมัครสมาชิก",
      href: "https://www.ezpok168.net/?utm_source=bio&utm_medium=button&utm_campaign=ezpok168_register",
      trackId: "register",
      action: "link",
      enabled: true,
      targetBlank: true
    },
    {
      id: "promotion",
      label: "โปรโมชั่น",
      href: "#",
      trackId: "promotion",
      action: "promo",
      enabled: true,
      targetBlank: false
    },
    {
      id: "contact-admin",
      label: "ติดต่อแอดมิน",
      href: "https://line.me/R/ti/p/@EZPOK?utm_source=bio&utm_medium=button&utm_campaign=ezpok168_service",
      trackId: "contact-admin",
      action: "link",
      enabled: true,
      targetBlank: true
    }
  ],
  promoImages: [
    { id: "promo-register-5", src: "promo/promo-register-5.webp", caption: "สมัครสมาชิกใหม่", alt: "โปรโมชั่นสมัครสมาชิกใหม่", enabled: true },
    { id: "promo-deposit-60", src: "promo/promo-deposit-60.webp", caption: "ฝาก 60 บาท", alt: "โปรโมชั่นฝาก 60 บาท", enabled: true },
    { id: "promo-top100", src: "promo/promo-top100.webp", caption: "TOP100", alt: "โปรโมชั่น TOP100", enabled: true },
    { id: "promo-one-click", src: "promo/promo-one-click.webp", caption: "แทงไม้เดียว", alt: "โปรโมชั่นแทงไม้เดียว", enabled: true },
    { id: "promo-first-deposit-10", src: "promo/promo-first-deposit-10.webp", caption: "ฝากบิลแรก", alt: "โปรโมชั่นฝากบิลแรก", enabled: true },
    { id: "promo-cashback-2", src: "promo/promo-cashback-2.webp", caption: "คืนยอด 2%", alt: "โปรโมชั่นคืนยอด 2 เปอร์เซ็นต์", enabled: true },
    { id: "promo-world-cup", src: "promo/promo-world-cup.webp", caption: "FIFA World Cup 2026", alt: "โปรโมชั่น FIFA World Cup 2026", enabled: true },
    { id: "promo-top10", src: "promo/promo-top10.webp", caption: "TOP10", alt: "โปรโมชั่น TOP10", enabled: true },
    { id: "promo-deposit-60-doomday", src: "promo/promo-deposit-60-doomday.webp", caption: "ฝาก 60 เพิ่ม doomsday", alt: "โปรโมชั่นฝาก 60 เพิ่ม doomsday", enabled: true },
    { id: "promo-cashback-2-special", src: "promo/promo-cashback-2-special.webp", caption: "คืนยอดเสีย 2%", alt: "โปรโมชั่นคืนยอดเสีย 2 เปอร์เซ็นต์", enabled: true }
  ]
};

function cleanSourceId(value) {
  return String(value || "")
    .trim()
    .toLowerCase()
    .replace(/[^a-z0-9_-]+/g, "-")
    .replace(/^-+|-+$/g, "")
    .slice(0, 60);
}

function getCurrentBioSource() {
  const params = new URLSearchParams(window.location.search);
  const sourceId = cleanSourceId(
    params.get("ref") ||
    params.get("source") ||
    params.get("bio") ||
    params.get("utm_source")
  ) || "direct";

  return {
    id: sourceId,
    name: params.get("source_name") || params.get("utm_campaign") || sourceId,
    url: window.location.href
  };
}

const currentBioSource = getCurrentBioSource();

function escapeHtml(value) {
  return String(value || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function safeCssUrl(value) {
  return String(value || "brand/bio-background.webp").replace(/["\\\n\r]/g, "");
}

function mergeBioConfig(config) {
  const input = config && typeof config === "object" ? config : {};
  return {
    ...defaultBioConfig,
    ...input,
    buttons: Array.isArray(input.buttons) ? input.buttons : defaultBioConfig.buttons,
    promoImages: Array.isArray(input.promoImages) ? input.promoImages : defaultBioConfig.promoImages
  };
}

function renderBioConfig(config) {
  const normalized = mergeBioConfig(config);
  const profileImage = document.getElementById("bioProfileImage");
  const buttons = document.getElementById("bioButtons");
  const gallery = document.getElementById("promoGallery");

  document.getElementById("bioTitle").textContent = normalized.title || "EZPOK168";
  document.getElementById("bioSubtitle").textContent = normalized.subtitle || "";
  document.getElementById("bioFooter").textContent = normalized.footer || "© EZPOK168 BIO";
  document.documentElement.style.setProperty("--bio-background-image", `url("${safeCssUrl(normalized.backgroundImage)}")`);
  profileImage.src = normalized.profileImage || "brand/brand-profile.webp";
  profileImage.alt = normalized.title || "EZPOK168";

  buttons.innerHTML = normalized.buttons
    .filter(function (button) {
      return button && button.enabled !== false && button.label;
    })
    .map(function (button) {
      const action = button.action === "promo" ? "promo" : "link";
      const id = cleanSourceId(button.id || button.trackId || button.label) || "button";
      const trackId = cleanSourceId(button.trackId || id) || id;
      const href = action === "promo" ? "#" : (button.href || "#");
      const target = action === "promo" || button.targetBlank === false ? "" : ' target="_blank" rel="noopener noreferrer"';
      const promoAttrs = action === "promo" ? ' id="promoBtn" role="button" aria-controls="promoModal" aria-expanded="false" data-promo-button="true"' : "";

      return `<a class="btn" href="${escapeHtml(href)}" data-track-id="${escapeHtml(trackId)}" data-track-label="${escapeHtml(button.label)}"${promoAttrs}${target}>${escapeHtml(button.label)}</a>`;
    }).join("");

  gallery.innerHTML = normalized.promoImages
    .filter(function (image) {
      return image && image.enabled !== false && image.src;
    })
    .map(function (image) {
      const caption = image.caption || "โปรโมชั่น";
      return `
        <figure class="promo-card">
          <img src="${escapeHtml(image.src)}" alt="${escapeHtml(image.alt || caption)}">
          <figcaption>${escapeHtml(caption)}</figcaption>
        </figure>
      `;
    }).join("") || '<p class="empty-state">ยังไม่มีรูปโปรโมชั่น</p>';
}

async function loadBioConfig() {
  if (window.location.protocol === "file:") {
    renderBioConfig(defaultBioConfig);
    return;
  }

  try {
    const configUrl = currentBioSource.id && currentBioSource.id !== "direct"
      ? `/api/bio-config?ref=${encodeURIComponent(currentBioSource.id)}`
      : "/api/bio-config";
    const response = await fetch(configUrl, { cache: "no-store" });
    if (!response.ok) {
      throw new Error("config_failed");
    }
    renderBioConfig(await response.json());
  } catch (error) {
    renderBioConfig(defaultBioConfig);
  }
}

function createClickStats() {
  return {
    version: 1,
    createdAt: new Date().toISOString(),
    updatedAt: null,
    totalClicks: 0,
    buttons: Object.fromEntries(
      Object.entries(trackedButtonDefaults).map(function ([id, label]) {
        return [id, { id: id, label: label, count: 0, lastClickedAt: null }];
      })
    ),
    events: []
  };
}

function loadClickStats() {
  try {
    const saved = JSON.parse(localStorage.getItem(clickStatsKey));
    const stats = saved && typeof saved === "object" ? saved : createClickStats();

    Object.entries(trackedButtonDefaults).forEach(function ([id, label]) {
      if (!stats.buttons) {
        stats.buttons = {};
      }

      if (!stats.buttons[id]) {
        stats.buttons[id] = { id: id, label: label, count: 0, lastClickedAt: null };
      }
    });

    if (!Array.isArray(stats.events)) {
      stats.events = [];
    }

    if (typeof stats.totalClicks !== "number") {
      stats.totalClicks = Object.values(stats.buttons).reduce(function (sum, button) {
        return sum + (Number(button.count) || 0);
      }, 0);
    }

    return stats;
  } catch (error) {
    return createClickStats();
  }
}

function saveClickStats(stats) {
  try {
    localStorage.setItem(clickStatsKey, JSON.stringify(stats));
  } catch (error) {
    console.warn("Unable to save click stats", error);
  }
}

function sendClickToBackend(clickEvent) {
  if (window.location.protocol === "file:") {
    return;
  }

  const payload = JSON.stringify(clickEvent);

  if (navigator.sendBeacon) {
    try {
      const sent = navigator.sendBeacon("/api/clicks", new Blob([payload], { type: "application/json" }));
      if (sent) {
        return;
      }
    } catch (error) {
      console.warn("Unable to send click with beacon", error);
    }
  }

  fetch("/api/clicks", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: payload,
    keepalive: true
  }).catch(function (error) {
    console.warn("Unable to send click stats", error);
  });
}

function recordClick(button) {
  const id = button.dataset.trackId;
  const label = button.dataset.trackLabel || trackedButtonDefaults[id] || button.textContent.trim();
  const now = new Date().toISOString();
  const stats = loadClickStats();
  const clickEvent = {
    id: id,
    label: label,
    href: button.getAttribute("href") || "",
    page: `${window.location.pathname || "index.html"}${window.location.search || ""}`,
    sourceId: currentBioSource.id,
    sourceName: currentBioSource.name,
    sourceUrl: currentBioSource.url,
    clickedAt: now
  };

  if (!stats.buttons[id]) {
    stats.buttons[id] = { id: id, label: label, count: 0, lastClickedAt: null };
  }

  stats.buttons[id].label = label;
  stats.buttons[id].count += 1;
  stats.buttons[id].lastClickedAt = now;
  stats.totalClicks += 1;
  stats.updatedAt = now;
  stats.events.unshift(clickEvent);
  stats.events = stats.events.slice(0, 200);

  saveClickStats(stats);
  sendClickToBackend(clickEvent);
}

const modal = document.getElementById("promoModal");
const bioButtons = document.getElementById("bioButtons");
const closeBtn = document.querySelector(".close");

function openModal() {
  const promoBtn = document.querySelector("[data-promo-button]");
  modal.classList.add("is-open");
  modal.setAttribute("aria-hidden", "false");
  if (promoBtn) {
    promoBtn.setAttribute("aria-expanded", "true");
  }
  closeBtn.focus();
}

function closeModal() {
  const promoBtn = document.querySelector("[data-promo-button]");
  modal.classList.remove("is-open");
  modal.setAttribute("aria-hidden", "true");
  if (promoBtn) {
    promoBtn.setAttribute("aria-expanded", "false");
    promoBtn.focus();
  }
}

bioButtons.addEventListener("click", function (event) {
  const button = event.target.closest("[data-track-id]");
  if (!button) {
    return;
  }

  recordClick(button);

  if (button.dataset.promoButton === "true") {
    event.preventDefault();
    openModal();
  }
});

closeBtn.addEventListener("click", closeModal);

modal.addEventListener("click", function (event) {
  if (event.target === modal) {
    closeModal();
  }
});

document.addEventListener("keydown", function (event) {
  if (event.key === "Escape" && modal.classList.contains("is-open")) {
    closeModal();
  }
});

loadBioConfig();
</script>
